name: Deploy to Server

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.2.3)'
        required: false
        default: ''
      announce:
        description: 'Update announcement'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy & Notify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get metadata
        id: meta
        run: |
          TAG=$(git tag --sort=-version:refname | head -1)
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${TAG:-N/A}"
          ANNOUNCE="${{ github.event.inputs.announce }}"
          [ -z "$ANNOUNCE" ] && ANNOUNCE="—"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "announce=$ANNOUNCE" >> $GITHUB_OUTPUT

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          {
            echo "Host ${{ secrets.VPS_HOST }}"
            echo "  ProxyCommand cloudflared access ssh --hostname %h"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
          } >> ~/.ssh/config

      - name: SSH Deploy
        env:
          CF_Access_Client_Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_Access_Client_Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /home/colten/CP-Hub && git pull origin main && docker compose up --build -d"

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$GITHUB_SHA"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IMG="https://raw.githubusercontent.com/${{ github.repository }}/main/static/images/CD-success.jpg"

          PAYLOAD=$(jq -n \
            --arg commit "$COMMIT_SHORT" \
            --arg commit_url "$COMMIT_URL" \
            --arg actions_url "$ACTIONS_URL" \
            --arg author "$COMMIT_AUTHOR" \
            --arg msg "$COMMIT_MESSAGE" \
            --arg branch "${{ github.ref_name }}" \
            --arg repo "${{ github.repository }}" \
            --arg run_num "${{ github.run_number }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg announce "${{ steps.meta.outputs.announce }}" \
            --arg img "$IMG" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              embeds: [{
                title: "✅ Deployment Successful (自動部屬成功)",
                url: $actions_url,
                color: 5763719,
                thumbnail: {url: $img},
                fields: [
                  {name: "📦 Commit ID", value: ("`" + $commit + "` [→ View](" + $commit_url + ")"), inline: true},
                  {name: "👤 Author", value: $author, inline: true},
                  {name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true},
                  {name: "🔖 Version", value: $version, inline: true},
                  {name: "📝 Commit Message", value: $msg},
                  {name: "📣 Update Announce", value: $announce}
                ],
                footer: {text: ($repo + "  •  Run #" + $run_num)},
                timestamp: $ts
              }]
            }')

          curl -fsSL -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          COMMIT_URL="https://github.com/${{ github.repository }}/commit/$GITHUB_SHA"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IMG="https://raw.githubusercontent.com/${{ github.repository }}/main/static/images/CD-fail.png"

          PAYLOAD=$(jq -n \
            --arg commit "$COMMIT_SHORT" \
            --arg commit_url "$COMMIT_URL" \
            --arg actions_url "$ACTIONS_URL" \
            --arg author "$COMMIT_AUTHOR" \
            --arg msg "$COMMIT_MESSAGE" \
            --arg branch "${{ github.ref_name }}" \
            --arg repo "${{ github.repository }}" \
            --arg run_num "${{ github.run_number }}" \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg img "$IMG" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              embeds: [{
                title: "❌ Deployment Failed (自動部屬失敗)",
                url: $actions_url,
                color: 15548997,
                description: "Click the title to view the failed run log.",
                thumbnail: {url: $img},
                fields: [
                  {name: "📦 Commit ID", value: ("`" + $commit + "` [→ View](" + $commit_url + ")"), inline: true},
                  {name: "👤 Author", value: $author, inline: true},
                  {name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true},
                  {name: "🔖 Version", value: $version, inline: true},
                  {name: "📝 Commit Message", value: $msg}
                ],
                footer: {text: ($repo + "  •  Run #" + $run_num)},
                timestamp: $ts
              }]
            }')

          curl -fsSL -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
