services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cphub
      POSTGRES_PASSWORD: cphub
      POSTGRES_DB: cphub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cphub"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DATABASE_URL: postgresql+asyncpg://cphub:cphub@db:5432/cphub
      ADMIN_DISCORD_IDS: ${ADMIN_DISCORD_IDS:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
